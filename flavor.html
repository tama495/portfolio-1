	<div class="contents">


				<div class="flmain">
					<h2 class="indextpc">フレーバーラインナップ</h2>

					<div class="image-flavor">
  						<figure data-id="1">						
							<img src="images/ice-sun.png" class="ice">
							<figcaption class="icemogifl">SUN（サン）<br>
							<p>酸味よりも甘みが強く濃厚で少し大人な味わいのブラッドオレンジ味。エネルギッシュな太陽をイメージしたアイスです。</p></figcaption>
						</figure>

						<figure data-id="2">
							<img src="images/ramu.png" class="ice">
							<figcaption class="icemogifl">MERCURY（マーキュリー）<br>
							<p>ラムネの軽い甘さと柚子の香りが合わさった、爽やかですっきりした味わい。水星をイメージしたアイスです。</p>
							</figcaption>
						</figure>

						<figure data-id="3">
  							<img src="images/remon.png" class="ice">
							<figcaption class="icemogifl">VENUS（ヴィーナス）<br>
							  <p>さっぱりしたレモンをベースに濃厚なはちみつを加えました。金星をイメージしたアイスです。</p>	
							</figcaption>
						</figure>

						<figure data-id="4">
  						<img src="images/mint.png" class="ice">
							<figcaption class="icemogifl">EARTH（アース）<br>
							  <p>チョコミントに少しバニラを加え、リアルさを意識。地球をイメージしたアイスです。</p>	
							</figcaption>
						</figure>
					</div>

					<div class="image-flavor2">
						<figure data-id="5">
  							<img src="images/vanira.png" class="ice">
							<figcaption class="icemogifl">MOON（ムーン）<br>
							  <p>甘すぎないふんわりとした優しいバニラ。月をイメージしたアイスです。</p>	
							</figcaption>
						</figure>

						<figure data-id="6">
							<img src="images/itigo.png" class="ice">
							<figcaption class="icemogifl">MARS(マーズ)<br>
							  <p>甘めの苺アイスをベースに、酸味のある苺の果肉も加えて苺づくしに。火星をイメージしたアイスです。</p>	
							</figcaption>
						</figure>

						<figure data-id="7">
  							<img src="images/telira.png" data-id="6" class="ice">
							<figcaption class="icemogifl">JUPITER(ジュピター)<br>
						  <p>ほろ苦さとまろやかな甘みが広がるティラミス味。木星をイメージしたアイスです。</p>		
							</figcaption>
						</figure>

						<figure data-id="8">
  							<img src="images/kyara.png" data-id="7" class="ice">
							<figcaption class="icemogifl">SATURN(サターン)<br>
							  <p>キャラメルアイスに、キャラメルをトッピングしてキャラメルづくしに。土星をイメージしたアイスです。</p>	
							</figcaption>
						</figure>
					</div>
					<div class="image-flavor3">
						<figure data-id="9">
  							<img src="images/mero.png" data-id="8" class="ice">
							<figcaption class="icemogifl">URANUS(ウラヌス)<br>
							  <p>さわやかで、どこか懐かしい夏を感じるメロン味。天王星をイメージしたアイスです。</p>	
							</figcaption>
						</figure>
						<figure data-id="10">
  							<img src="images/beri.png" data-id="9" class="ice">
							<figcaption class="icemogifl">NEPTUNE(ネプチューン)<br>
							  <p>深い甘みのあるブルーベリー味。できるだけ爽やかな味に仕上げました。まるで海のように深く青い海王星をイメージしたアイスです。</p>	
							</figcaption>
						</figure>
						<figure data-id="11">
  							<img src="images/choco.png" data-id="11" class="ice">
							<figcaption class="icemogifl">BLACK HOLE(ブラックホール)<br>
							  <p>真っ暗な闇のようにほろ苦く濃厚なダークチョコ。ブラックホールをイメージしたアイスです。</p>	
							</figcaption>
						</figure>
						<figure data-id="12">
  							<img src="images/spray.png" data-id="12" class="ice">
							<figcaption class="icemogifl">STARS(スターズ)<br>
							  <p>バニラアイスに、カラフルなカラースプレーを散りばめさせました。星たちをイメージしたアイスです。</p>	
							</figcaption>
						</figure>
					</div>
